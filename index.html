    // --- 新增：Web Audio API 机械按键音效合成器 ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function playMechanicalClick() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        // 振荡器1：低沉的物理撞击声“咔”
        const osc1 = audioCtx.createOscillator();
        const gain1 = audioCtx.createGain();
        osc1.type = 'square';
        osc1.frequency.setValueAtTime(120, audioCtx.currentTime);
        osc1.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.05);
        gain1.gain.setValueAtTime(0.4, audioCtx.currentTime);
        gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
        
        // 振荡器2：高频的微动开关声“嗒”
        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc2.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.03);
        gain2.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.03);

        osc1.connect(gain1); gain1.connect(audioCtx.destination);
        osc2.connect(gain2); gain2.connect(audioCtx.destination);

        osc1.start(); osc1.stop(audioCtx.currentTime + 0.05);
        osc2.start(); osc2.stop(audioCtx.currentTime + 0.03);
    }

            }
        },
        '000011': {
            name: '风地观',
            guaCi: '盥而不荐，有孚颙若。',
            yaoCi: {
                1: '初六：童观，小人无咎，君子吝。',
                2: '六二：闚观，利女贞。',
                3: '六三：观我生，进退。',
                4: '六四：观国之光，利用宾于王。',
                5: '九五：观我生，君子无咎。',
                6: '上九：观其生，君子无咎。'
            }
        },
        '100101': {
            name: '火雷噬嗑',
            guaCi: '亨。利用狱。',
            yaoCi: {
                1: '初九：屦校灭趾，无咎。',
                2: '六二：噬肤灭鼻，无咎。',
                3: '六三：噬腊肉，遇毒；小吝，无咎。',
                4: '九四：噬干胏，得金矢，利艰贞，吉。',
                5: '六五：噬干肉，得黄金，贞厉，无咎。',
                6: '上九：何校灭耳，凶。'
            }
        },
        '101001': {
            name: '山火贲',
            guaCi: '亨。小利有攸往。',
            yaoCi: {
                1: '初九：贲其趾，舍车而徒。',
                2: '六二：贲其须。',
                3: '九三：贲如濡如，永贞吉。',
                4: '六四：贲如皤如，白马翰如，匪寇婚媾。',
                5: '六五：贲于丘园，束帛戋戋，吝，终吉。',
                6: '上九：白贲，无咎。'
            }
        },
        '000001': {
            name: '山地剥',
            guaCi: '不利有攸往。',
            yaoCi: {
                1: '初六：剥床以足，蔑贞凶。',
                2: '六二：剥床以辨，蔑贞凶。',
                3: '六三：剥之，无咎。',
                4: '六四：剥床以肤，凶。',
                5: '六五：贯鱼，以宫人宠，无不利。',
                6: '上九：硕果不食，君子得舆，小人剥庐。'
            }
        },
        '100000': {
            name: '地雷复',
            guaCi: '亨。出入无疾，朋来无咎。反复其道，七日来复，利有攸往。',
            yaoCi: {
                1: '初九：不远复，无祗悔，元吉。',
                2: '六二：休复，吉。',
                3: '六三：频复，厉无咎。',
                4: '六四：中行独复。',
                5: '六五：敦复，无悔。',
                6: '上六：迷复，凶，有灾眚。用行师，终有大败，以其国君凶，至于十年不克征。'
            }
        },
        '100111': {
            name: '天雷无妄',
            guaCi: '元，亨，利，贞。其匪正有眚，不利有攸往。',
            yaoCi: {
                1: '初九：无妄，往吉。',
                2: '六二：不耕获，不菑畲，则利有攸往。',
                3: '六三：无妄之灾，或系之牛，行人之得，邑人之灾。',
                4: '九四：可贞，无咎。',
                5: '九五：无妄之疾，勿药有喜。',
                6: '上九：无妄，行有眚，无攸利。'
            }
        },
        '111001': {
            name: '山天大畜',
            guaCi: '利贞，不家食吉，利涉大川。',
            yaoCi: {
                1: '初九：有厉利已。',
                2: '九二：舆说輹。',
                3: '九三：良马逐，利艰贞。曰闲舆卫，利有攸往。',
                4: '六四：童牛之牿，元吉。',
                5: '六五：豮豕之牙，吉。',
                6: '上九：何天之衢，亨。'
            }
        },
        '100001': {
            name: '山雷颐',
            guaCi: '贞吉。观颐，自求口实。',
            yaoCi: {
                1: '初九：舍尔灵龟，观我朵颐，凶。',
                2: '六二：颠颐，拂经，于丘颐，征凶。',
                3: '六三：拂颐，贞凶，十年勿用，无攸利。',
                4: '六四：颠颐，吉，虎视眈眈，其欲逐逐，无咎。',
                5: '六五：拂经，居贞吉，不可涉大川。',
                6: '上九：由颐，厉吉，利涉大川。'
            }
        },
        '011110': {
            name: '泽风大过',
            guaCi: '栋桡，利有攸往，亨。',
            yaoCi: {
                1: '初六：藉用白茅，无咎。',
                2: '九二：枯杨生稊，老夫得其女妻，无不利。',
                3: '九三：栋桡，凶。',
                4: '九四：栋隆，吉；有它吝。',
                5: '九五：枯杨生华，老妇得其士夫，无咎无誉。',
                6: '上六：过涉灭顶，凶，无咎。'
            }
        },
        '010010': {
            name: '坎为水',
            guaCi: '习坎，有孚，维心亨，行有尚。',
            yaoCi: {
                1: '初六：习坎，入于坎窞，凶。',
                2: '九二：坎有险，求小得。',
                3: '六三：来之坎坎，险且枕，入于坎窞，勿用。',
                4: '六四：樽酒簋贰，用缶，纳约自牖，终无咎。',
                5: '九五：坎不盈，祗既平，无咎。',
                6: '上六：系用徽纆，寘于丛棘，三岁不得，凶。'
            }
        },
        '101101': {
            name: '离为火',
            guaCi: '利贞，亨。畜牝牛，吉。',
            yaoCi: {
                1: '初九：履错然，敬之无咎。',
                2: '六二：黄离，元吉。',
                3: '九三：日昃之离，不鼓缶而歌，则大耋之嗟，凶。',
                4: '九四：突如其来如，焚如，死如，弃如。',
                5: '六五：出涕沱若，戚嗟若，吉。',
                6: '上九：王用出征，有嘉折首，获匪其丑，无咎。'
            }
        },
        '001110': {
            name: '泽山咸',
            guaCi: '亨，利贞，取女吉。',
            yaoCi: {
                1: '初六：咸其拇。',
                2: '六二：咸其腓，凶，居吉。',
                3: '九三：咸其股，执其随，往吝。',
                4: '九四：贞吉悔亡，憧憧往来，朋从尔思。',
                5: '九五：咸其脢，无悔。',
                6: '上六：咸其辅，颊，舌。'
            }
        },
        '011100': {
            name: '雷风恒',
            guaCi: '亨，无咎，利贞，利有攸往。',
            yaoCi: {
                1: '初六：浚恒，贞凶，无攸利。',
                2: '九二：悔亡。',
                3: '九三：不恒其德，或承之羞，贞吝。',
                4: '九四：田无禽。',
                5: '六五：恒其德，贞，妇人吉，夫子凶。',
                6: '上六：振恒，凶。'
            }
        },
        '001111': {
            name: '天山遁',
            guaCi: '亨，小利贞。',
            yaoCi: {
                1: '初六：遁尾，厉，勿用有攸往。',
                2: '六二：执之用黄牛之革，莫之胜说。',
                3: '九三：系遁，有疾厉，畜臣妾吉。',
                4: '九四：好遁，君子吉，小人否。',
                5: '九五：嘉遁，贞吉。',
                6: '上九：肥遁，无不利。'
            }
        },
        '111100': {
            name: '雷天大壮',
            guaCi: '利贞。',
            yaoCi: {
                1: '初九：壮于趾，征凶，有孚。',
                2: '九二：贞吉。',
                3: '九三：小人用壮，君子用罔，贞厉。羝羊触藩，羸其角。',
                4: '九四：贞吉悔亡，藩决不羸，壮于大舆之輹。',
                5: '六五：丧羊于易，无悔。',
                6: '上六：羝羊触藩，不能退，不能遂，无攸利，艰则吉。'
            }
        },
        '000101': {
            name: '火地晋',
            guaCi: '康侯用锡马蕃庶，昼日三接。',
            yaoCi: {
                1: '初六：晋如，摧如，贞吉。罔孚，裕无咎。',
                2: '六二：晋如，愁如，贞吉。受兹介福，于其王母。',
                3: '六三：众允，悔亡。',
                4: '九四：晋如鼫鼠，贞厉。',
                5: '六五：悔亡，失得勿恤，往吉无不利。',
                6: '上九：晋其角，维用伐邑，厉吉无咎，贞吝。'
            }
        },
        '101000': {
            name: '地火明夷',
            guaCi: '利艰贞。',
            yaoCi: {
                1: '初九：明夷于飞，垂其翼。君子于行，三日不食，有攸往，主人有言。',
                2: '六二：明夷，夷于左股，用拯马壮，吉。',
                3: '九三：明夷于南狩，得其大首，不可疾贞。',
                4: '六四：入于左腹，获明夷之心，出于门庭。',
                5: '六五：箕子之明夷，利贞。',
                6: '上六：不明晦，初登于天，后入于地。'
            }
        },
        '101011': {
            name: '风火家人',
            guaCi: '利女贞。',
            yaoCi: {
                1: '初九：闲有家，悔亡。',
                2: '六二：无攸遂，在中馈，贞吉。',
                3: '九三：家人嗃嗃，悔厉吉；妇子嘻嘻，终吝。',
                4: '六四：富家，大吉。',
                5: '九五：王假有家，勿恤吉。',
                6: '上九：有孚威如，终吉。'
            }
        },
        '110101': {
            name: '火泽睽',
            guaCi: '小事吉。',
            yaoCi: {
                1: '初九：悔亡，丧马勿逐，自复；见恶人，无咎。',
                2: '九二：遇主于巷，无咎。',
                3: '六三：见舆曳，其牛掣，其人天且劓，无初有终。',
                4: '九四：睽孤，遇元夫，交孚，厉无咎。',
                5: '六五：悔亡，厥宗噬肤，往何咎。',
                6: '上九：睽孤，见豕负涂，载鬼一车，先张之弧，后说之弧，匪寇婚媾，往遇雨则吉。'
            }
        },
        '001010': {
            name: '水山蹇',
            guaCi: '利西南，不利东北；利见大人，贞吉。',
            yaoCi: {
                1: '初六：往蹇，来誉。',
                2: '六二：王臣蹇蹇，匪躬之故。',
                3: '九三：往蹇，来反。',
                4: '六四：往蹇，来连。',
                5: '九五：大蹇，朋来。',
                6: '上六：往蹇，来硕，吉；利见大人。'
            }
        },
        '010100': {
            name: '雷水解',
            guaCi: '利西南，无所往，其来复吉。有攸往，夙吉。',
            yaoCi: {
                1: '初六：无咎。',
                2: '九二：田获三狐，得黄矢，贞吉。',
                3: '六三：负且乘，致寇至，贞吝。',
                4: '九四：解而拇，朋至斯孚。',
                5: '六五：君子维有解，吉；有孚于小人。',
                6: '上六：公用射隼于高墉之上，获之，无不利。'
            }
        },
        '110001': {
            name: '山泽损',
            guaCi: '有孚，元吉，无咎，可贞，利有攸往。曷之用，二簋可用享。',
            yaoCi: {
                1: '初九：已事遄往，无咎，酌损之。',
                2: '九二：利贞，征凶，弗损益之。',
                3: '六三：三人行，则损一人；一人行，则得其友。',
                4: '六四：损其疾，使遄有喜，无咎。',
                5: '六五：或益之，十朋之龟弗克违，元吉。',
                6: '上九：弗损益之，无咎，贞吉，利有攸往，得臣无家。'
            }
        },
        '100011': {
            name: '风雷益',
            guaCi: '利有攸往，利涉大川。',
            yaoCi: {
                1: '初九：利用为大作，元吉，无咎。',
                2: '六二：或益之，十朋之龟弗克违，永贞吉。王用享于帝，吉。',
                3: '六三：益之用凶事，无咎。有孚中行，告公用圭。',
                4: '六四：中行，告公从。利用为依迁国。',
                5: '九五：有孚惠心，勿问元吉。有孚惠我德。',
                6: '上九：莫益之，或击之，立心勿恒，凶。'
            }
        },
        '111110': {
            name: '泽天夬',
            guaCi: '扬于王庭，孚号，有厉，告自邑，不利即戎，利有攸往。',
            yaoCi: {
                1: '初九：壮于前趾，往不胜为咎。',
                2: '九二：惕号，莫夜有戎，勿恤。',
                3: '九三：壮于頄，有凶。君子夬夬，独行遇雨，若濡有愠，无咎。',
                4: '九四：臀无肤，其行次且。牵羊悔亡，闻言不信。',
                5: '九五：苋陆夬夬，中行无咎。',
                6: '上六：无号，终有凶。'
            }
        },
        '011111': {
            name: '天风姤',
            guaCi: '女壮，勿用取女。',
            yaoCi: {
                1: '初六：系于金柅，贞吉，有攸往，见凶，羸豕孚蹢躅。',
                2: '九二：包有鱼，无咎，不利宾。',
                3: '九三：臀无肤，其行次且，厉，无大咎。',
                4: '九四：包无鱼，起凶。',
                5: '九五：以杞包瓜，含章，有陨自天。',
                6: '上九：姤其角，吝，无咎。'
            }
        },
        '000110': {
            name: '泽地萃',
            guaCi: '亨。王假有庙，利见大人，亨，利贞。用大牲吉，利有攸往。',
            yaoCi: {
                1: '初六：有孚不终，乃乱乃萃，若号一握为笑，勿恤，往无咎。',
                2: '六二：引吉，无咎，孚乃利用禴。',
                3: '六三：萃如，嗟如，无攸利，往无咎，小吝。',
                4: '九四：大吉，无咎。',
                5: '九五：萃有位，无咎。匪孚，元永贞，悔亡。',
                6: '上六：赍咨涕洟，无咎。'
            }
        },
        '011000': {
            name: '地风升',
            guaCi: '元亨，用见大人，勿恤，南征吉。',
            yaoCi: {
                1: '初六：允升，大吉。',
                2: '九二：孚乃利用禴，无咎。',
                3: '九三：升虚邑。',
                4: '六四：王用亨于岐山，吉无咎。',
                5: '六五：贞吉，升阶。',
                6: '上六：冥升，利于不息之贞。'
            }
        },
        '010110': {
            name: '泽水困',
            guaCi: '亨，贞，大人吉，无咎，有言不信。',
            yaoCi: {
                1: '初六：臀困于株木，入于幽谷，三岁不见。',
                2: '九二：困于酒食，朱绂方来，利用亨祀，征凶，无咎。',
                3: '六三：困于石，据于蒺藜，入于其宫，不见其妻，凶。',
                4: '九四：来徐徐，困于金车，吝，有终。',
                5: '九五：劓刖，困于赤绂，乃徐有说，利用祭祀。',
                6: '上六：困于葛藟，于臲卼，曰动悔。有悔，征吉。'
            }
        },
        '011010': {
            name: '水风井',
            guaCi: '改邑不改井，无丧无得，往来井井。汔至，亦未繘井，羸其瓶，凶。',
            yaoCi: {
                1: '初六：井泥不食，旧井无禽。',
                2: '九二：井谷射鲋，瓮敝漏。',
                3: '九三：井渫不食，为我心恻，可用汲，王明，并受其福。',
                4: '六四：井甃，无咎。',
                5: '九五：井冽，寒泉食。',
                6: '上六：井收勿幕，有孚元吉。'
            }
        },
        '101110': {
            name: '泽火革',
            guaCi: '已日乃孚，元亨利贞，悔亡。',
            yaoCi: {
                1: '初九：巩用黄牛之革。',
                2: '六二：已日乃革之，征吉，无咎。',
                3: '九三：征凶，贞厉，革言三就，有孚。',
                4: '九四：悔亡，有孚改命，吉。',
                5: '九五：大人虎变，未占有孚。',
                6: '上六：君子豹变，小人革面，征凶，居贞吉。'
            }
        },
        '011101': {
            name: '火风鼎',
            guaCi: '元吉，亨。',
            yaoCi: {
                1: '初六：鼎颠趾，利出否，得妾以其子，无咎。',
                2: '九二：鼎有实，我仇有疾，不我能即，吉。',
                3: '九三：鼎耳革，其行塞，雉膏不食，方雨亏悔，终吉。',
                4: '九四：鼎折足，覆公餗，其形渥，凶。',
                5: '六五：鼎黄耳金铉，利贞。',
                6: '上九：鼎玉铉，大吉，无不利。'
            }
        },
        '100100': {
            name: '震为雷',
            guaCi: '亨。震来虩虩，笑言哑哑。震惊百里，不丧匕鬯。',
            yaoCi: {
                1: '初九：震来虩虩，后笑言哑哑，吉。',
                2: '六二：震来厉，亿丧贝，跻于九陵，勿逐，七日得。',
                3: '六三：震苏苏，震行无眚。',
                4: '九四：震遂泥。',
                5: '六五：震往来厉，亿无丧，有事。',
                6: '上六：震索索，视矍矍，征凶。震不于其躬，于其邻，无咎。婚媾有言。'
            }
        },
        '001001': {
            name: '艮为山',
            guaCi: '艮其背，不获其身，行其庭，不见其人，无咎。',
            yaoCi: {
                1: '初六：艮其趾，无咎，利永贞。',
                2: '六二：艮其腓，不拯其随，其心不快。',
                3: '九三：艮其限，列其夤，厉熏心。',
                4: '六四：艮其身，无咎。',
                5: '六五：艮辅，言有序，悔亡。',
                6: '上九：敦艮，吉。'
            }
        },
        '001011': {
            name: '风山渐',
            guaCi: '女归吉，利贞。',
            yaoCi: {
                1: '初六：鸿渐于干，小子厉，有言，无咎。',
                2: '六二：鸿渐于磐，饮食衎衎，吉。',

    // 全局状态变量：记录当前推演进度
    let currentLine = 1;      // 当前正在推演第几爻 (1-6)
    let currentChange = 1;    // 当前处于第几变 (1-3)
    let currentStalks = 49;   // 当前手中剩余的蓍草数量

    // 交互式步进推演核心算法
    function nextStep() {
        playMechanicalClick(); // --- 新增：触发实体按键音效 ---
        // 初始化重置
        if (!isDivining) {
            isDivining = true;
            currentLine = 1;
            currentChange = 1;
            currentStalks = 49;
            lines = [];
            movingCount = 0;
            movingIndices = [];
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('benGuaLines').innerHTML = '';
            document.getElementById('bianGuaLines').innerHTML = '';
            document.getElementById('benGuaNameBottom').innerHTML = '';
            document.getElementById('bianGuaNameBottom').innerHTML = '';
            logBox.innerHTML = '<div>[系统就绪] 准备五十根蓍草，大衍之数五十，其用四十有九...</div>';
        }

        if (currentLine > 6) return;

        // 1. 分而为二以象两 (真实的随机分拨)
        let left = Math.floor(Math.random() * (currentStalks - 1)) + 1;
        let right = currentStalks - left;
        
        // 2. 挂一以象三
        let guay = 1;
        right -= guay;
        
        // 3. 揲之以四以象四时，归奇于扐以象闰
        let leftRem = left % 4 === 0 ? 4 : left % 4;
        let rightRem = right % 4 === 0 ? 4 : right % 4;
        let removed = guay + leftRem + rightRem; 
        
        currentStalks -= removed;

        let totalGrabs = (currentLine - 1) * 3 + currentChange;
        
        // 实时展示蓍草分拨的数值变化
        let displayStr = `第 ${currentLine} 爻 - 第 ${currentChange} 变：左手 ${left} 根，右手 ${right + guay} 根 ➔ 挂一，揲四余数 左${leftRem} 右${rightRem}。余 ${currentStalks} 策`;
        document.getElementById('stalksDisplay').innerText = displayStr;
        log(`[第 ${totalGrabs} 拨] ` + displayStr);

        currentChange++;

        // 如果三变完成，得出一爻
        if (currentChange > 3) {
            let val = currentStalks / 4;
            lines.push(val);
            
            let type = "";
            if (val === 6) { type = "老阴 (动)"; movingCount++; movingIndices.push(currentLine); }
            if (val === 7) { type = "少阳 (静)"; }
            if (val === 8) { type = "少阴 (静)"; }
            if (val === 9) { type = "老阳 (动)"; movingCount++; movingIndices.push(currentLine); }
            
            log(`<b style="color:var(--accent-color);">第 ${currentLine} 爻得出数字：${val} [${type}]</b>`);
            drawYao(val, currentLine); // 在界面画出一爻

            currentLine++;
            currentChange = 1;
            currentStalks = 49; // 蓍草归位，准备下一爻的推演

            if (currentLine <= 6) {
                setTimeout(() => {
                    document.getElementById('stalksDisplay').innerText = `第 ${currentLine-1} 爻完成。蓍草已归位 49 根，请进行下一拨抓取。`;
                }, 300);
            }
        }

        // 更新按钮提示文字与状态
        let btn = document.getElementById('startBtn');
        if (currentLine > 6) {
            btn.innerText = "六爻推演完毕，点击查看占断解析";
            document.getElementById('stalksDisplay').innerText = "本卦、变卦已出。";
            log(`<br><b>全部推演完毕。</b> 共发现 ${movingCount} 个动爻。`);
            
            // 绑定解析事件
            btn.onclick = function() {
                playMechanicalClick(); // --- 新增：触发实体按键音效 ---
                analyze(lines, movingCount, movingIndices);
                btn.innerText = "重新占问：复位仪器，开始大衍之数推演";
                btn.onclick = nextStep; // 恢复重新推演的功能
                isDivining = false;
            };
        } else {
            let nextTotal = (currentLine - 1) * 3 + currentChange;
            btn.innerText = `进行第 ${nextTotal} 拨抓取`;
        }
    }
    // 绘制爻象
    function drawYao(val, index) {
        const benContainer = document.getElementById('benGuaLines');
        const bianContainer = document.getElementById('bianGuaLines');
        
        // 生成本卦的爻
        let isYang = (val === 7 || val === 9);
        let isMoving = (val === 6 || val === 9);
        
        let benHTML = `<div class="yao ${isMoving ? 'moving' : ''}">
            <span style="margin-right:10px;">${index}</span>
            ${isYang ? '<div class="yang"></div>' : '<div class="yin"><div></div><div></div></div>'}
            <span style="margin-left:10px;">${val}</span>
        </div>`;
        benContainer.insertAdjacentHTML('afterbegin', benHTML);

        // 生成变卦的爻 (动爻翻转)
        let bianYang = isMoving ? !isYang : isYang;
        let bianHTML = `<div class="yao">
            <span style="margin-right:10px;">${index}</span>
            ${bianYang ? '<div class="yang"></div>' : '<div class="yin"><div></div><div></div></div>'}
            <span style="margin-left:10px;">${isMoving ? (val===9?8:7) : val}</span>
        </div>`;
        bianContainer.insertAdjacentHTML('afterbegin', bianHTML);
    }

    // 获取上下卦组合
    function getTrigrams(lines) {
        let binStr = lines.map(v => (v === 7 || v === 9) ? '1' : '0').join('');
        let lower = binStr.substring(0, 3);
        let upper = binStr.substring(3, 6);
        return { lower: bagua[lower], upper: bagua[upper] };
    }

        const benInnerName = benTri.lower.name; 
        const benOuterName = benTri.upper.name;

        // 1. 抓取现状词汇并生成段落
        let innerDesc = getRandomText(db.inner[benInnerName]);
        let outerDesc = getRandomText(db.outer[benOuterName]);

        let html = `<p><b>针对【${topicName}】的深度解析：</b></p>`;
        html += `<p>就目前而言，你的内在状态或驱动力表现为：“<b>${innerDesc}</b>”（内卦为${benInnerName}）；而你所面对的客观局势与外部环境则是：“<b>${outerDesc}</b>”（外卦为${benOuterName}）。这构成了你当下处境的底层基本盘。</p>`;

        // 2. 根据是否有动爻，抓取演化词汇并生成段落
        if (movingCount > 0) {
            let bianInnerName = bianTri.lower.name;
            let bianOuterName = bianTri.upper.name;
            let bianInnerDesc = getRandomText(db.inner[bianInnerName]);
            let bianOuterDesc = getRandomText(db.outer[bianOuterName]);

            html += `<p>《易》讲求生生不息，变动不居。由于卦象中出现了 ${movingCount} 个动爻，意味着看似稳定的局势下正发生着暗流涌动的相变。</p>`;
            html += `<p>随着事情的推演，未来的趋势将指引你的内在心态转化为：“<b>${bianInnerDesc}</b>”（内卦化为${bianInnerName}）。同时，你的外部环境也将随之演变为：“<b>${bianOuterDesc}</b>”（外卦化为${bianOuterName}）。</p>`;

            // 动态补充建议
            html += `<p style="color: var(--accent-color); font-weight: bold;">💡 破局建议：</p>`;
            html += `<p>顺应并察觉这种“从 ${benInnerName} 到 ${bianInnerName}”的心态转变，同时提前防范或利用好“从 ${benOuterName} 到 ${bianOuterName}”的环境变化。上方提供的古法动爻辞，正是你在此转折点上的行动指南。</p>`;
        } else {
            html += `<p>卦象显示当前六爻皆静，没有任何动爻。这意味着在这个特定的问题上，系统目前处于极度锁定和高维稳的状态，短期内极难发生质的突变。</p>`;
            
            html += `<p style="color: var(--accent-color); font-weight: bold;">💡 破局建议：</p>`;
            html += `<p>此时不宜轻举妄动或强求改变。保持耐心，接纳并顺应当下“内${benInnerName}外${benOuterName}”的格局，在“无常”中寻找“常”，休养生息，等待下一个时机的到来是最好的策略。</p>`;
        }

        return html;
    }
    // --------------------------------------------------------

    // 朱熹解卦算法与综合解析
    function analyze(lines, movingCount, movingIndices) {
        const topicBox = document.getElementById('topic');
        const topicName = topicBox.options[topicBox.selectedIndex].text;
        
        // 计算变卦数组
        let bianLines = lines.map(v => {
            if (v === 9) return 8;
            if (v === 6) return 7;
            return v;
        });
        let benTri = getTrigrams(lines);
        let bianTri = getTrigrams(bianLines);

        // --- 新增：获取并显示具体卦名到卦象下方 ---
        let benBinStr = lines.map(v => (v === 7 || v === 9) ? '1' : '0').join('');
        let bianBinStr = bianLines.map(v => (v === 7 || v === 9) ? '1' : '0').join('');
        
        // 如果接入了完整的 hexagramData 数据库则优先用经典卦名，否则拼凑上下卦名
        let benGuaName = typeof hexagramData !== 'undefined' && hexagramData[benBinStr] ? hexagramData[benBinStr].name : `${benTri.upper.name}上${benTri.lower.name}下`;
        let bianGuaName = typeof hexagramData !== 'undefined' && hexagramData[bianBinStr] ? hexagramData[bianBinStr].name : `${bianTri.upper.name}上${bianTri.lower.name}下`;

        document.getElementById('benGuaNameBottom').innerText = benGuaName;
        if(movingCount > 0) {
            document.getElementById('bianGuaNameBottom').innerText = bianGuaName;
        } else {
            document.getElementById('bianGuaNameBottom').innerText = "无变卦";
        }
        // ------------------------------------------

        let ruleText = "";
        let focusText = "";

        // 朱熹算法 IF...THEN...
        if (movingCount === 0) {
            ruleText = "六爻皆静。系统处于绝对稳态。";
            focusText = "查阅【本卦的卦辞】。重点看当下的宏观格局。";
        } else if (movingCount === 1) {
            ruleText = `一爻动（第 ${movingIndices[0]} 爻）。系统突破口在于此点。`;
            focusText = `查阅【本卦第 ${movingIndices[0]} 爻的爻辞】。此乃破局之钥。`;
        } else if (movingCount === 2) {
            ruleText = `两爻动（第 ${movingIndices[0]}、${movingIndices[1]} 爻）。事情有两个演化方向。`;
            focusText = `查阅【本卦两动爻的爻辞】，以位置靠上（第 ${movingIndices[1]} 爻）为主，靠下为辅。`;
        } else if (movingCount === 3) {
            ruleText = "三爻动。系统处于剧烈动荡、半新半旧的混沌期。";
            focusText = "抛弃局部爻辞。综合考量【本卦卦辞】与【变卦卦辞】。";
        } else if (movingCount === 4) {
            ruleText = "四爻动。旧状态基本瓦解，新状态即将确立。";
            let staticIndices = [1,2,3,4,5,6].filter(x => !movingIndices.includes(x));
            focusText = `查阅【变卦】中两个静爻（第 ${staticIndices[0]}、${staticIndices[1]} 爻）的爻辞，以位置靠下（第 ${staticIndices[0]} 爻）为主。旧势力的残留是关键。`;
        } else if (movingCount === 5) {
            ruleText = "五爻动。沧海桑田，面目全非。";
            let staticIndex = [1,2,3,4,5,6].find(x => !movingIndices.includes(x));
            focusText = `查阅【变卦】中唯一静爻（第 ${staticIndex} 爻）的爻辞。这是洪流中唯一的执念与锚点。`;
        } else if (movingCount === 6) {
            ruleText = "六爻皆动。旧系统彻底覆灭，新系统诞生。";
            let isQian = lines.every(v => v === 9);
            let isKun = lines.every(v => v === 6);
            if (isQian) focusText = "全阳俱动，查阅乾卦【用九】辞：见群龙无首，吉。";
            else if (isKun) focusText = "全阴俱动，查阅坤卦【用六】辞：利永贞。";
            else focusText = "查阅【变卦的卦辞】。";
        }

        // --- 修复：从数据库构建经典卦辞/爻辞展示模块 ---
        let benGuaData = typeof hexagramData !== 'undefined' ? hexagramData[benBinStr] : null;
        let bianGuaData = typeof hexagramData !== 'undefined' ? hexagramData[bianBinStr] : null;
        
        let classicTextHtml = "";
        if (benGuaData) {
            classicTextHtml += `<div style="background:#fff; padding:15px; border:1px solid #d3cbb8; margin-top:15px;">`;
            classicTextHtml += `<h4 style="margin-top:0; color:#8b2500;">易经原辞 · 本卦：${benGuaData.name}</h4>`;
            classicTextHtml += `<p><b>卦辞：</b>${benGuaData.guaCi}</p>`;
            
            // 根据动爻数量决定显示哪条经典断语
            if (movingCount === 1) {
                classicTextHtml += `<p style="color:#8b2500;"><b>动爻辞：</b>${benGuaData.yaoCi[movingIndices[0]]}</p>`;
            } else if (movingCount === 2) {
                classicTextHtml += `<p style="color:#8b2500;"><b>动爻辞 (主)：</b>${benGuaData.yaoCi[movingIndices[1]]}</p>`;
                classicTextHtml += `<p><b>动爻辞 (辅)：</b>${benGuaData.yaoCi[movingIndices[0]]}</p>`;
            } else if (movingCount >= 4 && bianGuaData) {
                 classicTextHtml += `<hr style="border:0; border-top:1px dashed #d3cbb8; margin: 10px 0;">`;
                 classicTextHtml += `<h4 style="margin-top:0; color:#8b2500;">易经原辞 · 变卦：${bianGuaData.name}</h4>`;
                 classicTextHtml += `<p><b>变卦卦辞：</b>${bianGuaData.guaCi}</p>`;
            }
            classicTextHtml += `</div>`;
        }

       // 生成解读文案（上半部分：结构与易经原辞）
        let html = `
            <p><b>占问领域：</b>${topicName}</p>
            <p><b>本卦结构：</b>上${benTri.upper.name}下${benTri.lower.name}。内蕴【${benTri.lower.attr}】之性，外显【${benTri.upper.attr}】之象。(${benTri.lower.desc}，且 ${benTri.upper.desc})。</p>
            <p><b>演化法则：</b><span class="highlight">${ruleText}</span></p>
            <p><b>古法查阅指引：</b>${focusText}</p>
            ${classicTextHtml} 
            <hr style="border:0; border-top:1px dashed #d3cbb8; margin: 20px 0;">
        `;

        // --- 新增：调用 AI 引擎，生成针对性、拟人化的下半部分解读 ---
        // 注意这里传入了 topicBox.value (如 'career', 'academics') 以便去数据库匹配词汇
        let aiDeductionHtml = generateAIDeduction(topicBox.value, benTri, bianTri, movingCount);
        html += aiDeductionHtml;

        document.getElementById('analysisText').innerHTML = html;
        document.getElementById('resultSection').style.display = 'block';
    }
</script>
